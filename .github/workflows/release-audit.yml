name: release-audit

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install JavaScript dependencies
        run: |
          npm ci
          npm --prefix site ci

      - name: Build Astro site
        run: npm --prefix site run build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run release audit
        run: |
          python3 scripts/pipeline/release_audit.py --root .
