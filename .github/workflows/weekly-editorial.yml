name: weekly-editorial

on:
  workflow_dispatch:
    inputs:
      issue_id:
        description: "Optional issue id override (YYYY-WW)"
        required: false
        type: string
      skip_buttondown:
        description: "Skip Buttondown draft API call"
        required: false
        default: false
        type: boolean
      skip_source_audit:
        description: "Skip candidate/rejected feed audit"
        required: false
        default: false
        type: boolean
      no_enforce_artifacts:
        description: "Do not fail run when required artifacts are missing"
        required: false
        default: false
        type: boolean
  schedule:
    # GitHub Actions cron is UTC-only. Europe/London Monday 08:00 maps to:
    # - 08:00 UTC during GMT (winter)
    # - 07:00 UTC during BST (summer)
    # We trigger both and gate execution below using TZ-aware checks.
    - cron: "0 7 * * 1"
    - cron: "0 8 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Guard Monday 08:00 Europe/London (schedule only)
        id: london_gate
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_pipeline=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch detected: bypassing Monday 08:00 gate"
            exit 0
          fi

          LONDON_HOUR="$(TZ=Europe/London date +%H)"
          LONDON_DOW="$(TZ=Europe/London date +%u)"
          if [ "$LONDON_DOW" = "1" ] && [ "$LONDON_HOUR" = "08" ]; then
            echo "run_pipeline=true" >> "$GITHUB_OUTPUT"
            echo "Proceeding at Monday 08:00 Europe/London"
          else
            echo "run_pipeline=false" >> "$GITHUB_OUTPUT"
            echo "Skipping scheduled run: current Europe/London time is not Monday 08:00"
          fi

      - uses: actions/checkout@v4
        if: steps.london_gate.outputs.run_pipeline == 'true'

      - uses: actions/setup-python@v5
        if: steps.london_gate.outputs.run_pipeline == 'true'
        with:
          python-version: "3.11"

      - name: Run issue-id validator regression checks
        if: steps.london_gate.outputs.run_pipeline == 'true'
        run: |
          python3 scripts/pipeline/test_issue_id_guard.py

      - name: Build pipeline args (manual dispatch inputs)
        if: steps.london_gate.outputs.run_pipeline == 'true'
        id: pipeline_args
        shell: bash
        run: |
          args=()

          issue_id="${{ github.event.inputs.issue_id || '' }}"
          if [ -n "$issue_id" ]; then
            if ! python3 - "$issue_id" <<'PY'
import pathlib
import sys

root = pathlib.Path.cwd()
sys.path.insert(0, str(root / "scripts/pipeline"))

from issue_id_guard import validate_issue_id

issue_id = sys.argv[1]
try:
    validate_issue_id(issue_id)
except ValueError as exc:
    raise SystemExit(f"Invalid issue_id input: {exc}")
PY
            then
              exit 1
            fi
            args+=("--issue-id" "$issue_id")
          fi

          if [ "${{ github.event.inputs.skip_buttondown || 'false' }}" = "true" ]; then
            args+=("--skip-buttondown")
          fi

          if [ "${{ github.event.inputs.skip_source_audit || 'false' }}" = "true" ]; then
            args+=("--skip-source-audit")
          fi

          if [ "${{ github.event.inputs.no_enforce_artifacts || 'false' }}" = "true" ]; then
            args+=("--no-enforce-artifacts")
          fi

          printf 'pipeline_args=%q ' "${args[@]}" >> "$GITHUB_OUTPUT"
          echo >> "$GITHUB_OUTPUT"
          echo "Pipeline args: ${args[*]:-(none)}"

      - name: Run editorial pipeline
        if: steps.london_gate.outputs.run_pipeline == 'true'
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: |
          python3 scripts/pipeline/run_weekly.py ${{ steps.pipeline_args.outputs.pipeline_args }}

      - name: Upload artifacts
        if: steps.london_gate.outputs.run_pipeline == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: editorial-artifacts
          path: |
            artifacts/
            drafts/
            posts/

      - name: Create PR
        if: steps.london_gate.outputs.run_pipeline == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(editorial): weekly queue + draft issue"
          title: "Weekly editorial draft"
          body: |
            Automated weekly editorial draft generated.

            ## Includes
            - editorial queue artifacts
            - website issue draft
            - Buttondown draft metadata (if created)

            ## Quick links
            - Checklist template: [.github/pull_request_template.md](.github/pull_request_template.md)
            - Pipeline run summary: [artifacts/last_run.json](artifacts/last_run.json)
            - Draft mapping: [artifacts/buttondown_drafts.json](artifacts/buttondown_drafts.json)

            ## Editorial checklist
            - [ ] Review artifacts listed in `artifacts/last_run.json`
            - [ ] Validate queue markdown/json and drafted site/email content
            - [ ] Confirm Buttondown draft details (ID/URL) before send
            - [ ] Complete remaining items in the PR template checklist before merge/send
          branch: chore/weekly-editorial
          delete-branch: true
